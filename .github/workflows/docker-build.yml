# ──────────────────────────────────────────────────────────────
# Docker Build — Build & verify all service images on main
# ──────────────────────────────────────────────────────────────
name: Docker Build

on:
  push:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: backend
            context: ./services/backend
          - name: frontend
            context: ./services/frontend
          - name: python-api
            context: ./services/python-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: hackathon-platform/${{ matrix.service.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-up:
    name: Docker Compose — smoke test
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy env template
        run: cp .env.example .env

      - name: Build & start all services
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for postgres…"
          timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U hackathon; do sleep 2; done'

          echo "Waiting for backend…"
          timeout 60 bash -c 'until curl -sf http://localhost:4000/health; do sleep 2; done'

          echo "Waiting for python-api…"
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'

          echo "Waiting for frontend…"
          timeout 30 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'

      - name: Verify backend health
        run: curl -sf http://localhost:4000/health | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Verify python-api health
        run: curl -sf http://localhost:8000/health | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Print logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: Tear down
        if: always()
        run: docker compose down -v
