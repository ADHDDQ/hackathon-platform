# render.yaml – Render.com Blueprint
#
# Single service: builds the root Dockerfile (Docker-in-Docker) which
# starts a Docker daemon inside the container and runs docker compose up.
#
# ⚠  This requires PRIVILEGED mode. Render does not support privileged
#    containers on shared plans. Use a Render Private Service / VM, or
#    any VPS where you can pass --privileged to docker run.
#
# Secrets: set these in the Render dashboard before first deploy.

services:
  - type: web
    name: hackathon-platform
    runtime: docker
    dockerfilePath: ./Dockerfile # root Dockerfile (DinD + docker compose)
    plan: starter # use a paid plan – free plan lacks privileges
    envVars:
      # ── Backend ─────────────────────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: VITE_BACKEND_URL
        sync: false
      # ── n8n ─────────────────────────────────────────────
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        sync: false
      - key: DB_POSTGRESDB_PORT
        value: '5432'
      - key: DB_POSTGRESDB_DATABASE
        sync: false
      - key: DB_POSTGRESDB_USER
        sync: false
      - key: DB_POSTGRESDB_PASSWORD
        sync: false
      - key: N8N_ENCRYPTION_KEY
        sync: false
      # ── Python API ──────────────────────────────────────
      - key: HF_TOKEN
        sync: false
